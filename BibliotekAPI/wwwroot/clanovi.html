<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteka — Članovi</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="app-shell">
        <div class="main-content">
            <div class="page-header">
                <div>
                    <div class="page-title">Članovi</div>
                    <div class="page-subtitle">Registrovani članovi biblioteke</div>
                </div>
                <button class="btn btn-primary" onclick="openAddModal()">+ Dodaj člana</button>
            </div>

            <div class="card" style="margin-bottom:20px">
                <div class="card-body" style="padding:14px 22px">
                    <div class="search-bar" style="flex-wrap:wrap;gap:8px">
                        <input class="search-input" id="txtSearch" type="text" placeholder="Pretraži po imenu ili telefonu...">
                        <select class="form-control" id="cmbClanstvo" style="width:200px;padding:9px 13px">
                            <option value="">Sva članstva</option>
                        </select>
                        <button class="btn btn-secondary" onclick="pretrazi()">Pretraži</button>
                        <button class="btn btn-secondary" onclick="reset()">Reset</button>
                        <span style="margin-left:auto;font-family:Syne,sans-serif;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)" id="lblBroj"></span>
                    </div>
                </div>
            </div>

            <div class="split-layout">
                <div class="card">
                    <div class="table-wrap">
                        <table>
                            <thead><tr><th>Ime i prezime</th><th>Telefon</th><th>Članstvo</th><th>Važi do</th><th>Status</th></tr></thead>
                            <tbody id="tbodyClanovi">
                                <tr><td colspan="5"><div class="loading-state"><div class="spinner"></div>Učitavanje...</div></td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div id="detailPanel" style="display:none">
                    <div class="detail-panel">
                        <div id="statusBar" class="status-bar"></div>
                        <div class="detail-row"><span class="detail-label">Vrsta članstva</span><span class="detail-value" id="dClanstvo"></span></div>
                        <div class="detail-row"><span class="detail-label">Član od</span><span class="detail-value" id="dDatumOd"></span></div>
                        <div class="detail-row"><span class="detail-label">Član do</span><span class="detail-value" id="dDatumDo"></span></div>
                        <hr style="margin:16px 0;border:none;border-top:1px solid var(--border-lt)">
                        <div style="font-family:Syne,sans-serif;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:14px">Izmena podataka</div>
                        <div class="form-row">
                            <div class="form-group"><label class="form-label">Ime</label><input class="form-control" id="eIme" type="text"></div>
                            <div class="form-group"><label class="form-label">Prezime</label><input class="form-control" id="ePrezime" type="text"></div>
                        </div>
                        <div class="form-group"><label class="form-label">Telefon</label><input class="form-control" id="eTelefon" type="number"></div>
                        <div class="form-row">
                            <div class="form-group"><label class="form-label">Datum od</label><input class="form-control" id="eDatumOd" type="date"></div>
                            <div class="form-group"><label class="form-label">Datum do</label><input class="form-control" id="eDatumDo" type="date"></div>
                        </div>
                        <div class="form-group"><label class="form-label">Vrsta članarine</label><select class="form-control" id="eClanstvo"></select></div>
                        <div style="display:flex;gap:8px;margin-top:6px">
                            <button class="btn btn-primary" style="flex:1" onclick="sacuvajIzmene()">Sačuvaj</button>
                            <button class="btn btn-danger btn-sm" onclick="obrisiClana()">Obriši</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="addModal" style="display:none" onclick="if(event.target===this)closeAddModal()">
        <div class="modal">
            <div class="modal-title">Dodaj novog člana</div>
            <div class="form-row">
                <div class="form-group"><label class="form-label">Ime</label><input class="form-control" id="mIme" type="text"></div>
                <div class="form-group"><label class="form-label">Prezime</label><input class="form-control" id="mPrezime" type="text"></div>
            </div>
            <div class="form-group"><label class="form-label">Telefon</label><input class="form-control" id="mTelefon" type="number"></div>
            <div class="form-row">
                <div class="form-group"><label class="form-label">Datum od</label><input class="form-control" id="mDatumOd" type="date"></div>
                <div class="form-group"><label class="form-label">Datum do</label><input class="form-control" id="mDatumDo" type="date"></div>
            </div>
            <div class="form-group"><label class="form-label">Vrsta članarine</label><select class="form-control" id="mClanstvo"></select></div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeAddModal()">Odustani</button>
                <button class="btn btn-primary" onclick="dodajClana()">Sačuvaj</button>
            </div>
        </div>
    </div>

    <script src="/api.js"></script>
    <script src="/sidebar.js"></script>
    <script>
        let clanovi = [], clanstva = [], selektovaniClan = null;

        (async () => {
            const status = await requireAuth();
            if (!status) return;
            initPage('clanovi', status);
            clanstva = await API.getClanstva().catch(() => []);
            const opts = clanstva.map(c => `<option value="${c.id}">${c.vrsta} (${c.cena} RSD)</option>`).join('');
            ['cmbClanstvo', 'eClanstvo', 'mClanstvo'].forEach(id => {
                const el = document.getElementById(id);
                if (id === 'cmbClanstvo') el.innerHTML = '<option value="">Sva članstva</option>' + opts;
                else el.innerHTML = opts;
            });
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('mDatumOd').value = today;
            document.getElementById('mDatumDo').value = new Date(Date.now() + 365 * 86400000).toISOString().split('T')[0];
            await ucitaj();
        })();

        async function ucitaj() {
            try { clanovi = await API.getClanovi(); renderTabela(getFiltered()); document.getElementById('lblBroj').textContent = `Ukupno: ${getFiltered().length}`; }
            catch (ex) { toast('Greška: ' + ex.message, 'error'); }
        }

        function getFiltered() {
            const q = document.getElementById('txtSearch').value.trim().toLowerCase();
            const cv = document.getElementById('cmbClanstvo').value;
            return clanovi.filter(c => {
                const mQ = !q || c.ime.toLowerCase().includes(q) || c.prezime.toLowerCase().includes(q) || String(c.telefon).includes(q);
                const mC = !cv || c.idClanstva == cv;
                return mQ && mC;
            });
        }

        function renderTabela(lista) {
            const tb = document.getElementById('tbodyClanovi');
            if (!lista?.length) {
                tb.innerHTML = '<tr><td colspan="5"><div class="empty-state"><div class="empty-state-icon">◎</div><div class="empty-state-text">Nema rezultata</div></div></td></tr>'; return;
            }
            tb.innerHTML = lista.map(c => {
                const aktivan = new Date(c.datumDo) >= new Date();
                const cs = clanstva.find(x => x.id === c.idClanstva);
                return `<tr onclick="selektuj(${c.id})" class="${selektovaniClan?.id === c.id ? 'selected' : ''}">
          <td style="font-weight:600">${c.ime} ${c.prezime}</td>
          <td style="color:var(--muted);font-family:Syne,sans-serif;font-size:12px">${c.telefon}</td>
          <td>${cs ? cs.vrsta : '—'}</td>
          <td style="color:var(--muted)">${fmtDatum(c.datumDo)}</td>
          <td><span class="badge ${aktivan ? 'badge-success' : 'badge-danger'}">${aktivan ? 'Aktivna' : 'Istekla'}</span></td>
        </tr>`;
            }).join('');
        }

        function selektuj(id) {
            selektovaniClan = clanovi.find(c => c.id === id);
            if (!selektovaniClan) return;
            renderTabela(getFiltered()); prikaziDetalje(selektovaniClan);
            document.getElementById('detailPanel').style.display = '';
        }

        function prikaziDetalje(c) {
            const aktivan = new Date(c.datumDo) >= new Date();
            const sb = document.getElementById('statusBar');
            sb.className = aktivan ? 'status-bar active' : 'status-bar expired';
            sb.textContent = aktivan ? '✓ Aktivna članarina' : '✗ Članarina istekla';
            const cs = clanstva.find(x => x.id === c.idClanstva);
            document.getElementById('dClanstvo').textContent = cs ? `${cs.vrsta} — ${cs.cena} RSD` : '—';
            document.getElementById('dDatumOd').textContent = fmtDatum(c.datumOd);
            document.getElementById('dDatumDo').textContent = fmtDatum(c.datumDo);
            document.getElementById('eIme').value = c.ime;
            document.getElementById('ePrezime').value = c.prezime;
            document.getElementById('eTelefon').value = c.telefon;
            document.getElementById('eDatumOd').value = c.datumOd?.split('T')[0] || '';
            document.getElementById('eDatumDo').value = c.datumDo?.split('T')[0] || '';
            document.getElementById('eClanstvo').value = c.idClanstva;
        }

        function pretrazi() { const f = getFiltered(); renderTabela(f); document.getElementById('lblBroj').textContent = `Ukupno: ${f.length}`; }
        function reset() { document.getElementById('txtSearch').value = ''; document.getElementById('cmbClanstvo').value = ''; renderTabela(clanovi); document.getElementById('lblBroj').textContent = `Ukupno: ${clanovi.length}`; }
        document.getElementById('txtSearch').addEventListener('keydown', e => { if (e.key === 'Enter') pretrazi(); });

        async function sacuvajIzmene() {
            if (!selektovaniClan) return;
            const ime = document.getElementById('eIme').value.trim();
            const prezime = document.getElementById('ePrezime').value.trim();
            const telefon = parseInt(document.getElementById('eTelefon').value);
            const datumOd = document.getElementById('eDatumOd').value;
            const datumDo = document.getElementById('eDatumDo').value;
            const idClanstva = parseInt(document.getElementById('eClanstvo').value);
            if (!ime || !prezime || !telefon || !datumOd || !datumDo || !idClanstva) { toast('Popunite sva polja.', 'error'); return; }
            try {
                await API.updateClan(selektovaniClan.id, { ime, prezime, telefon, datumOd, datumDo, idClanstva });
                toast('Član izmenjen.'); await ucitaj();
                const u = clanovi.find(c => c.id === selektovaniClan.id);
                if (u) { selektovaniClan = u; prikaziDetalje(u); }
            } catch (ex) { toast(ex.message, 'error'); }
        }

        async function obrisiClana() {
            if (!selektovaniClan) return;
            if (!confirm(`Obrisati člana ${selektovaniClan.ime} ${selektovaniClan.prezime}?`)) return;
            try {
                await API.deleteClan(selektovaniClan.id); toast('Član obrisan.');
                selektovaniClan = null; document.getElementById('detailPanel').style.display = 'none'; await ucitaj();
            } catch (ex) { toast(ex.message, 'error'); }
        }

        function openAddModal() {
            ['mIme', 'mPrezime', 'mTelefon'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('addModal').style.display = 'flex';
            setTimeout(() => document.getElementById('mIme').focus(), 50);
        }
        function closeAddModal() { document.getElementById('addModal').style.display = 'none'; }

        async function dodajClana() {
            const ime = document.getElementById('mIme').value.trim();
            const prezime = document.getElementById('mPrezime').value.trim();
            const telefon = parseInt(document.getElementById('mTelefon').value);
            const datumOd = document.getElementById('mDatumOd').value;
            const datumDo = document.getElementById('mDatumDo').value;
            const idClanstva = parseInt(document.getElementById('mClanstvo').value);
            if (!ime || !prezime || !telefon || !datumOd || !datumDo || !idClanstva) { toast('Popunite sva polja.', 'error'); return; }
            try {
                await API.addClan({ ime, prezime, telefon, datumOd, datumDo, idClanstva });
                toast('Član dodat.'); closeAddModal(); await ucitaj();
            } catch (ex) { toast(ex.message, 'error'); }
        }
    </script>
</body>
</html>
