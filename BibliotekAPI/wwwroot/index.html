<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biblioteka — Pregled</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-shell">
  <div class="main-content" id="mainContent" style="display:none">
    <div class="page-header">
      <div>
        <div class="page-title" id="welcomeMsg">Dobrodošli</div>
        <div class="page-subtitle">Pregled aktivnosti biblioteke</div>
      </div>
    </div>

    <div class="stats-row" id="statsRow">
      <div class="stat-card"><div class="stat-value" id="statKnjige">—</div><div class="stat-label">Knjiga u katalogu</div></div>
      <div class="stat-card"><div class="stat-value" id="statClanovi">—</div><div class="stat-label">Registrovanih članova</div></div>
      <div class="stat-card"><div class="stat-value" id="statAktivne">—</div><div class="stat-label">Aktivnih pozajmica</div></div>
      <div class="stat-card"><div class="stat-value" id="statZakasnjele" style="color:var(--danger)">—</div><div class="stat-label">Zakasnjele pozajmice</div></div>
    </div>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
      <!-- Poslednje pozajmice -->
      <div class="card">
        <div class="card-header">
          <div class="card-title">Nedavne pozajmice</div>
          <a href="pozajmice.html" class="btn btn-sm btn-secondary">Sve pozajmice →</a>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Član</th><th>Datum</th><th>Status</th></tr></thead>
            <tbody id="tbRecentPoz"></tbody>
          </table>
        </div>
      </div>

      <!-- Zakasnjele pozajmice -->
      <div class="card">
        <div class="card-header">
          <div class="card-title" style="color:var(--danger)">⚠ Zakasnjele pozajmice</div>
          <a href="pozajmice.html" class="btn btn-sm btn-secondary">Prikaži sve →</a>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Član</th><th>Knjiga</th><th>Rok</th></tr></thead>
            <tbody id="tbLatePoz"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="api.js"></script>
<script src="sidebar.js"></script>
<script>
(async () => {
  await initPage('index');

  const status = await API.authStatus();
  document.getElementById('welcomeMsg').textContent = `Dobrodošli, ${status.ime || ''}!`;

  // Paralelno učitaj sve podatke
  const [knjige, clanovi, pozajmice] = await Promise.all([
    API.getKnjige().catch(() => []),
    API.getClanovi().catch(() => []),
    API.getPozajmice().catch(() => [])
  ]);

  document.getElementById('statKnjige').textContent = knjige.length;
  document.getElementById('statClanovi').textContent = clanovi.length;

  const aktivne = pozajmice.filter(p => p.status === 'Aktivna' || p.status === 'Zakasnelo');
  const zakasnjele = pozajmice.filter(p => p.status === 'Zakasnelo');
  document.getElementById('statAktivne').textContent = aktivne.length;
  document.getElementById('statZakasnjele').textContent = zakasnjele.length;

  // Nedavne pozajmice (poslednje 8)
  const recent = [...pozajmice].sort((a,b) => new Date(b.datumOd) - new Date(a.datumOd)).slice(0, 8);
  const tbR = document.getElementById('tbRecentPoz');
  if (recent.length === 0) {
    tbR.innerHTML = '<tr><td colspan="3" class="empty-state" style="padding:24px;text-align:center;color:var(--muted)">Nema pozajmica</td></tr>';
  } else {
    tbR.innerHTML = recent.map(p => `
      <tr onclick="location.href='pozajmice.html'" style="cursor:pointer">
        <td>${p.imePrezimeClana || '—'}</td>
        <td>${fmtDatum(p.datumOd)}</td>
        <td><span class="badge ${statusBadge(p.status)}">${p.status || '—'}</span></td>
      </tr>`).join('');
  }

  // Zakasnjele — sa stavkama
  const tbL = document.getElementById('tbLatePoz');
  if (zakasnjele.length === 0) {
    tbL.innerHTML = '<tr><td colspan="3" style="padding:24px;text-align:center;color:var(--muted)">Nema zakasnjenih 🎉</td></tr>';
  } else {
    const rows = [];
    zakasnjele.forEach(p => {
      (p.stavke || []).filter(s => !s.datumVracanja && new Date(s.rokPozajmice) < new Date()).forEach(s => {
        rows.push(`<tr onclick="location.href='pozajmice.html'" style="cursor:pointer">
          <td>${p.imePrezimeClana || '—'}</td>
          <td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.nazivKnjige || '—'}</td>
          <td style="color:var(--danger);font-weight:600">${fmtDatum(s.rokPozajmice)}</td>
        </tr>`);
      });
    });
    tbL.innerHTML = rows.slice(0,8).join('');
  }

  document.getElementById('mainContent').style.display = '';
})();

function statusBadge(s) {
  if (s === 'Aktivna') return 'badge-info';
  if (s === 'Zakasnelo') return 'badge-danger';
  if (s === 'Vraceno') return 'badge-success';
  return 'badge-muted';
}
</script>
</body>
</html>
