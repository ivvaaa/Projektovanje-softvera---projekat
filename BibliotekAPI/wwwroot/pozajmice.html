<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteka — Pozajmice</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="app-shell">
        <div class="main-content">

            <div class="page-header">
                <div>
                    <div class="page-title">Pozajmice</div>
                    <div class="page-subtitle">Evidencija pozajmljenih knjiga</div>
                </div>
                <button class="btn btn-primary" onclick="openNewModal()">+ Nova pozajmica</button>
            </div>

            <!-- Search -->
            <div class="card" style="margin-bottom:16px">
                <div class="card-body" style="padding:14px 22px">
                    <div class="search-bar">
                        <input class="search-input" id="txtSearch" type="text" placeholder="Pretraži po članu, knjizi..." style="flex:1;max-width:360px">
                        <button class="btn btn-secondary" onclick="pretrazi()">Pretraži</button>
                        <button class="btn btn-secondary" onclick="resetFilter()">Reset</button>
                        <span style="margin-left:auto;font-family:Syne,sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)" id="lblBroj"></span>
                    </div>
                </div>
            </div>

            <!-- Filter chips -->
            <div class="filter-chips">
                <div class="filter-chip active" data-filter="all" onclick="setFilter('all',this)">Sve</div>
                <div class="filter-chip" data-filter="Zakasnelo" onclick="setFilter('Zakasnelo',this)">▲ Zakasnjele</div>
                <div class="filter-chip" data-filter="Aktivna" onclick="setFilter('Aktivna',this)">Aktivne</div>
                <div class="filter-chip" data-filter="Vraceno" onclick="setFilter('Vraceno',this)">Vraćene</div>
            </div>

            <!-- Main layout -->
            <div class="split-layout">

                <!-- Table + pagination -->
                <div class="card">
                    <div class="table-wrap">
                        <table>
                            <thead>
                                <tr>
                                    <th>Član</th>
                                    <th>Bibliotekar</th>
                                    <th>Datum</th>
                                    <th>Knjige</th>
                                    <th>Status</th>
                                    <th>Vraćeno</th>
                                </tr>
                            </thead>
                            <tbody id="tbodyPoz">
                                <tr><td colspan="6"><div class="loading-state"><div class="spinner"></div>Učitavanje...</div></td></tr>
                            </tbody>
                        </table>
                    </div>
                    <!-- Paginacija -->
                    <div class="pagination" id="paginacija" style="display:none">
                        <span class="pagination-info" id="paginacijaInfo"></span>
                        <button class="btn btn-secondary btn-sm" id="btnPrev" onclick="promeniStranu(-1)">← Preth. 10</button>
                        <button class="btn btn-secondary btn-sm" id="btnNext" onclick="promeniStranu(1)">Sled. 10 →</button>
                    </div>
                </div>

                <!-- Detail panel -->
                <div id="detailPanel" style="display:none">
                    <div class="detail-panel">
                        <div id="statusBar" class="status-bar"></div>
                        <div class="detail-row"><span class="detail-label">Član</span><span class="detail-value" id="dClan"></span></div>
                        <div class="detail-row"><span class="detail-label">Bibliotekar</span><span class="detail-value" id="dBib"></span></div>
                        <div class="detail-row"><span class="detail-label">Datum</span><span class="detail-value" id="dDatum"></span></div>
                        <div class="detail-row"><span class="detail-label">Br. knjiga</span><span class="detail-value" id="dBrojK"></span></div>

                        <hr style="margin:14px 0;border:none;border-top:1px solid var(--border)">
                        <div style="font-family:Syne,sans-serif;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.16em;color:var(--muted);margin-bottom:10px">Pozajmljene knjige</div>
                        <div id="stavkeContainer"></div>

                        <div id="akcijePanel" style="display:none">
                            <hr style="margin:14px 0;border:none;border-top:1px solid var(--border)">
                            <div style="font-family:Syne,sans-serif;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.16em;color:var(--muted);margin-bottom:10px">Izmena roka</div>
                            <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
                                <input type="checkbox" id="chkIzmeniRok" onchange="document.getElementById('dtpRok').disabled=!this.checked" style="accent-color:var(--accent);width:15px;height:15px;cursor:pointer">
                                <label for="chkIzmeniRok" style="font-size:12px;cursor:pointer;font-weight:500">Izmeni rok za sve aktivne</label>
                            </div>
                            <input class="form-control" type="date" id="dtpRok" disabled style="margin-bottom:12px">
                            <button class="btn btn-primary" style="width:100%" onclick="sacuvajIzmene()">Sačuvaj izmene</button>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Modal: Nova pozajmica -->
    <div class="modal-overlay" id="newModal" style="display:none" onclick="if(event.target===this)closeNewModal()">
        <div class="modal" style="width:560px">
            <div class="modal-title">Nova pozajmica</div>
            <div class="form-group">
                <label class="form-label">Član</label>
                <select class="form-control" id="mClan"><option value="">Izaberite člana...</option></select>
            </div>
            <div style="font-family:Syne,sans-serif;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.16em;color:var(--muted);margin-bottom:8px">Knjige za pozajmicu</div>
            <div style="border:1px solid var(--border);margin-bottom:12px">
                <div style="padding:8px 12px;background:var(--surface2);border-bottom:1px solid var(--border)">
                    <input type="text" id="mKnjigaSearch" class="search-input" placeholder="Pretraži dostupne knjige..." style="width:100%;background:transparent;border-color:transparent" oninput="filterKnjige()">
                </div>
                <div id="knjigaLista" style="max-height:200px;overflow-y:auto"></div>
            </div>
            <div id="odabraneKnjige" style="margin-bottom:14px"></div>
            <div class="form-group">
                <label class="form-label">Rok vraćanja</label>
                <input class="form-control" type="date" id="mRok">
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeNewModal()">Odustani</button>
                <button class="btn btn-primary" onclick="kreirajPozajmicu()">Kreiraj pozajmicu</button>
            </div>
        </div>
    </div>

    <script src="/api.js"></script>
    <script src="/sidebar.js"></script>
    <script>
        let pozajmice = [], filtrirane = [], selektovana = null;
        let activeFilter = 'all', trenutnaStrana = 0;
        const PAGE_SIZE = 10;
        let sveKnjige = [], sveClanovi = [], odabraneKnjige = [];

        const urlParams = new URLSearchParams(window.location.search);
        activeFilter = urlParams.get('filter') || 'all';

        (async () => {
            const status = await requireAuth();
            if (!status) return;
            initPage('pozajmice', status);

            // Aktiviraj chip
            const chip = document.querySelector(`[data-filter="${activeFilter}"]`);
            if (chip) {
                document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
            }

            await ucitaj();
        })();

        async function ucitaj() {
            try {
                pozajmice = await API.getPozajmice();
                pozajmice.sort((a, b) => {
                    const o = { Zakasnelo: 0, Aktivna: 1, Vraceno: 2 };
                    return (o[a.status] ?? 3) - (o[b.status] ?? 3) || new Date(b.datumOd) - new Date(a.datumOd);
                });
                applyFilter();
            } catch (ex) { toast('Greška: ' + ex.message, 'error'); }
        }

        function applyFilter() {
            const q = document.getElementById('txtSearch').value.trim().toLowerCase();
            filtrirane = pozajmice.filter(p => {
                const mF = activeFilter === 'all' || p.status === activeFilter;
                const mQ = !q
                    || (p.imePrezimeClana || '').toLowerCase().includes(q)
                    || (p.imePrezimeBibliotekar || '').toLowerCase().includes(q)
                    || (p.stavke || []).some(s => (s.nazivKnjige || '').toLowerCase().includes(q));
                return mF && mQ;
            });
            trenutnaStrana = 0;
            renderTabela();
        }

        function renderTabela() {
            const od = trenutnaStrana * PAGE_SIZE;
            const do_ = Math.min(od + PAGE_SIZE, filtrirane.length);
            const stranica = filtrirane.slice(od, do_);

            document.getElementById('lblBroj').textContent = `Ukupno: ${filtrirane.length}`;

            const tb = document.getElementById('tbodyPoz');
            if (!filtrirane.length) {
                tb.innerHTML = `<tr><td colspan="6"><div class="empty-state">
          <div class="empty-state-icon">◻</div>
          <div class="empty-state-text">Nema pozajmica</div>
        </div></td></tr>`;
                document.getElementById('paginacija').style.display = 'none';
                return;
            }

            tb.innerHTML = stranica.map(p => {
                const naslovi = (p.stavke || []).map(s => s.nazivKnjige).filter(Boolean).join(', ');
                return `<tr onclick="selektuj(${p.id})" class="${selektovana?.id === p.id ? 'selected' : ''}">
          <td style="font-weight:600">${p.imePrezimeClana || '—'}</td>
          <td style="color:var(--muted)">${p.imePrezimeBibliotekar || '—'}</td>
          <td style="color:var(--muted)">${fmtDatum(p.datumOd)}</td>
          <td style="max-width:170px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px;color:var(--muted)">${naslovi || '—'}</td>
          <td><span class="badge ${sBadge(p.status)}">${p.status || '—'}</span></td>
          <td style="font-size:12px;color:var(--muted)">${p.datumVracanja ? fmtDatum(p.datumVracanja) : '—'}</td>
        </tr>`;
            }).join('');

            // Paginacija
            const pag = document.getElementById('paginacija');
            pag.style.display = filtrirane.length > PAGE_SIZE ? '' : 'none';
            document.getElementById('paginacijaInfo').textContent = `${od + 1}–${do_} od ${filtrirane.length}`;
            document.getElementById('btnPrev').disabled = trenutnaStrana === 0;
            document.getElementById('btnNext').disabled = do_ >= filtrirane.length;
        }

        function promeniStranu(s) {
            trenutnaStrana += s;
            selektovana = null;
            document.getElementById('detailPanel').style.display = 'none';
            renderTabela();
        }

        function selektuj(id) {
            selektovana = pozajmice.find(p => p.id === id);
            if (!selektovana) return;
            renderTabela();
            prikaziDetalje(selektovana);
            document.getElementById('detailPanel').style.display = '';
        }

        function prikaziDetalje(p) {
            const sb = document.getElementById('statusBar');
            const m = { Aktivna: ['active', '▶ Aktivna'], Zakasnelo: ['expired', '▲ Zakasnela'], Vraceno: ['active', '✓ Vraćena'] };
            const [cls, txt] = m[p.status] || ['warning', '—'];
            sb.className = `status-bar ${cls}`; sb.textContent = txt;

            document.getElementById('dClan').textContent = p.imePrezimeClana || '—';
            document.getElementById('dBib').textContent = p.imePrezimeBibliotekar || '—';
            document.getElementById('dDatum').textContent = fmtDatum(p.datumOd);
            document.getElementById('dBrojK').textContent = (p.stavke || []).length;

            const cont = document.getElementById('stavkeContainer');
            cont.innerHTML = (p.stavke || []).map(s => {
                const vracena = !!s.datumVracanja;
                const zak = !vracena && new Date(s.rokPozajmice) < new Date();
                const cls2 = zak ? 'stavka-row stavka-zakasnela' : vracena ? 'stavka-row stavka-vracena' : 'stavka-row';
                return `<div class="${cls2}">
          ${!vracena && (p.status === 'Aktivna' || p.status === 'Zakasnelo')
                        ? `<input type="checkbox" class="stavka-chk" data-id="${s.idKnjige}">`
                        : '<span style="width:15px"></span>'}
          <span class="stavka-title">${s.nazivKnjige || '—'}</span>
          <span class="stavka-rok" style="color:${zak ? 'var(--danger)' : vracena ? 'var(--success)' : 'var(--muted)'}">
            ${vracena ? '✓ ' + fmtDatum(s.datumVracanja) : zak ? '▲ ' + fmtDatum(s.rokPozajmice) : fmtDatum(s.rokPozajmice)}
          </span>
        </div>`;
            }).join('');

            const aktivna = p.status === 'Aktivna' || p.status === 'Zakasnelo';
            document.getElementById('akcijePanel').style.display = aktivna ? '' : 'none';
            if (aktivna) {
                document.getElementById('chkIzmeniRok').checked = false;
                document.getElementById('dtpRok').disabled = true;
                const aktS = (p.stavke || []).filter(s => !s.datumVracanja);
                if (aktS.length) {
                    const maxRok = aktS.reduce((m, s) => new Date(s.rokPozajmice) > new Date(m.rokPozajmice) ? s : m);
                    document.getElementById('dtpRok').value = maxRok.rokPozajmice.split('T')[0];
                }
            }
        }

        async function sacuvajIzmene() {
            if (!selektovana) return;
            const vratiIds = Array.from(document.querySelectorAll('.stavka-chk:checked')).map(c => parseInt(c.dataset.id));
            const izmeniRok = document.getElementById('chkIzmeniRok').checked;
            const noviRok = document.getElementById('dtpRok').value;
            if (!vratiIds.length && !izmeniRok) { toast('Označite knjige ili izmenu roka.', 'error'); return; }
            if (izmeniRok && (!noviRok || new Date(noviRok) <= new Date())) { toast('Rok mora biti u budućnosti.', 'error'); return; }
            try {
                for (const id of vratiIds) await API.vratiKnjigu(selektovana.id, id).catch(() => { });
                if (izmeniRok) await API.izmeniRok(selektovana.id, noviRok).catch(() => { });
                toast('Izmene sačuvane.');
                await ucitaj();
                const u = pozajmice.find(p => p.id === selektovana.id);
                if (u) { selektovana = u; prikaziDetalje(u); renderTabela(); }
            } catch (ex) { toast(ex.message, 'error'); }
        }

        function setFilter(f, el) {
            activeFilter = f;
            document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            applyFilter();
        }
        function pretrazi() { applyFilter(); }
        function resetFilter() {
            document.getElementById('txtSearch').value = '';
            activeFilter = 'all';
            document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
            document.querySelector('[data-filter="all"]').classList.add('active');
            applyFilter();
        }
        document.getElementById('txtSearch').addEventListener('keydown', e => { if (e.key === 'Enter') pretrazi(); });

        function sBadge(s) {
            if (s === 'Aktivna') return 'badge-info';
            if (s === 'Zakasnelo') return 'badge-danger';
            if (s === 'Vraceno') return 'badge-success';
            return 'badge-muted';
        }

        // ── NOVA POZAJMICA ──────────────────────────
        async function openNewModal() {
            odabraneKnjige = [];
            document.getElementById('odabraneKnjige').innerHTML = '';
            document.getElementById('mKnjigaSearch').value = '';
            document.getElementById('mRok').value = new Date(Date.now() + 14 * 86400000).toISOString().split('T')[0];
            [sveKnjige, sveClanovi] = await Promise.all([
                API.getKnjige().catch(() => []),
                API.getClanovi().catch(() => [])
            ]);
            document.getElementById('mClan').innerHTML = '<option value="">Izaberite člana...</option>' +
                sveClanovi.map(c => `<option value="${c.id}">${c.ime} ${c.prezime} (${c.telefon})</option>`).join('');
            filterKnjige();
            document.getElementById('newModal').style.display = 'flex';
        }

        function filterKnjige() {
            const q = document.getElementById('mKnjigaSearch').value.toLowerCase();
            const dostupne = sveKnjige.filter(k => k.dostupna && !odabraneKnjige.find(o => o.id === k.id));
            const f = q ? dostupne.filter(k => k.naziv.toLowerCase().includes(q) || k.imePisca.toLowerCase().includes(q)) : dostupne;
            const cont = document.getElementById('knjigaLista');
            if (!f.length) {
                cont.innerHTML = '<div style="padding:14px;text-align:center;color:var(--muted);font-family:Syne,sans-serif;font-size:10px;letter-spacing:.1em;text-transform:uppercase">Nema dostupnih knjiga</div>';
                return;
            }
            cont.innerHTML = f.slice(0, 20).map(k => `
        <div onclick="odaberiKnjigu(${k.id})" style="padding:9px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);transition:background .1s" onmouseover="this.style.background='var(--surface2)'" onmouseout="this.style.background=''">
          <div>
            <div style="font-size:13px;font-weight:600">${k.naziv}</div>
            <div style="font-size:11px;color:var(--muted)">${k.imePisca} ${k.prezimePisca}</div>
          </div>
          <span class="badge badge-success">${k.brojSlobodnih} sl.</span>
        </div>`).join('');
        }

        function odaberiKnjigu(id) {
            const k = sveKnjige.find(x => x.id === id);
            if (!k || odabraneKnjige.find(o => o.id === id)) return;
            odabraneKnjige.push(k); filterKnjige(); renderOdabrane();
        }
        function ukloniKnjigu(id) {
            odabraneKnjige = odabraneKnjige.filter(k => k.id !== id);
            filterKnjige(); renderOdabrane();
        }
        function renderOdabrane() {
            const cont = document.getElementById('odabraneKnjige');
            if (!odabraneKnjige.length) { cont.innerHTML = ''; return; }
            cont.innerHTML = `<div style="font-family:Syne,sans-serif;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.16em;color:var(--muted);margin-bottom:8px">Odabrano (${odabraneKnjige.length})</div>` +
                odabraneKnjige.map(k => `
          <div style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--surface2);margin-bottom:5px;border:1px solid var(--border)">
            <span style="flex:1;font-size:13px;font-weight:500">${k.naziv}</span>
            <button onclick="ukloniKnjigu(${k.id})" style="background:none;border:none;cursor:pointer;color:var(--danger);font-weight:800;font-size:14px;padding:0;line-height:1">✕</button>
          </div>`).join('');
        }

        function closeNewModal() { document.getElementById('newModal').style.display = 'none'; }

        async function kreirajPozajmicu() {
            const idClan = parseInt(document.getElementById('mClan').value);
            const rok = document.getElementById('mRok').value;
            if (!idClan) { toast('Izaberite člana.', 'error'); return; }
            if (!odabraneKnjige.length) { toast('Dodajte bar jednu knjigu.', 'error'); return; }
            if (!rok) { toast('Unesite rok vraćanja.', 'error'); return; }
            try {
                await API.addPozajmica({ idClan, stavke: odabraneKnjige.map(k => ({ idKnjige: k.id, rokPozajmice: rok })) });
                toast('Pozajmica kreirana.'); closeNewModal(); await ucitaj();
            } catch (ex) { toast(ex.message, 'error'); }
        }
    </script>
</body>
</html>
