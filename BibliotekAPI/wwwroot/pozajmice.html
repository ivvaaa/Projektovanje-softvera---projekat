<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biblioteka — Pozajmice</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
.filter-chips { display:flex; gap:6px; margin-bottom:14px; flex-wrap:wrap; }
.filter-chip { padding:4px 12px; border:1px solid var(--border); border-radius:100px; font-size:12px; font-weight:500; cursor:pointer; background:var(--surface); transition:all .15s; }
.filter-chip:hover { border-color:var(--accent); }
.filter-chip.active { background:var(--accent); color:#fff; border-color:var(--accent); }
.stavka-row { display:flex; align-items:center; gap:10px; padding:8px 12px; border-radius:7px; background:var(--bg); margin-bottom:6px; }
.stavka-row input[type=checkbox] { width:16px; height:16px; cursor:pointer; accent-color:var(--accent); }
.stavka-title { flex:1; font-size:13px; font-weight:500; }
.stavka-rok { font-size:11px; font-family:'DM Mono',monospace; }
.stavka-zakasnela { background:#fdeaea; }
.stavka-vracena { opacity:.5; }
</style>
</head>
<body>
<div class="app-shell">
  <div class="main-content">
    <div class="page-header">
      <div>
        <div class="page-title">Pozajmice</div>
        <div class="page-subtitle">Evidencija pozajmljenih knjiga</div>
      </div>
      <button class="btn btn-primary" onclick="openNewModal()">+ Nova pozajmica</button>
    </div>

    <!-- Search -->
    <div class="card" style="margin-bottom:16px">
      <div class="card-body" style="padding:14px 20px">
        <div class="search-bar">
          <input class="search-input" id="txtSearch" type="text" placeholder="Pretraži po članu, bibliotekaru ili knjizi..." style="width:360px">
          <button class="btn btn-secondary" onclick="pretrazi()">Pretraži</button>
          <button class="btn btn-secondary" onclick="reset()">Reset</button>
          <span style="margin-left:auto;font-size:13px;color:var(--muted)" id="lblBroj"></span>
        </div>
      </div>
    </div>

    <!-- Status filter chips -->
    <div class="filter-chips">
      <div class="filter-chip active" data-filter="all" onclick="setFilter('all',this)">Sve</div>
      <div class="filter-chip" data-filter="Zakasnelo" onclick="setFilter('Zakasnelo',this)" style="color:var(--danger)">⚠ Zakasnjele</div>
      <div class="filter-chip" data-filter="Aktivna" onclick="setFilter('Aktivna',this)" style="color:var(--accent)">Aktivne</div>
      <div class="filter-chip" data-filter="Vraceno" onclick="setFilter('Vraceno',this)" style="color:var(--success)">Vraćene</div>
    </div>

    <div class="split-layout">
      <!-- Tabela pozajmica -->
      <div class="card">
        <div class="table-wrap">
          <table>
            <thead><tr><th>Član</th><th>Bibliotekar</th><th>Datum</th><th>Knjiga(e)</th><th>Status</th><th>Vraćeno</th></tr></thead>
            <tbody id="tbodyPoz">
              <tr><td colspan="6"><div class="loading-state"><div class="spinner"></div> Učitavanje...</div></td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Detail panel -->
      <div id="detailPanel" style="display:none">
        <div class="detail-panel">
          <div id="statusBar" class="status-bar"></div>
          <div class="detail-row"><span class="detail-label">Član</span><span class="detail-value" id="dClan"></span></div>
          <div class="detail-row"><span class="detail-label">Bibliotekar</span><span class="detail-value" id="dBib"></span></div>
          <div class="detail-row"><span class="detail-label">Datum</span><span class="detail-value" id="dDatum"></span></div>
          <div class="detail-row"><span class="detail-label">Br. knjiga</span><span class="detail-value" id="dBrojK"></span></div>

          <hr style="margin:14px 0;border:none;border-top:1px solid var(--border)">
          <div style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:10px">Pozajmljene knjige</div>
          <div id="stavkeContainer"></div>

          <!-- Akcije — vidljive samo za aktivne/zakasnjele -->
          <div id="akcijePanel" style="display:none">
            <hr style="margin:14px 0;border:none;border-top:1px solid var(--border)">
            <div style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:10px">Izmena roka</div>
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
              <input type="checkbox" id="chkIzmeniRok" onchange="document.getElementById('dtpRok').disabled=!this.checked">
              <label for="chkIzmeniRok" style="font-size:13px;cursor:pointer">Izmeni rok za sve aktivne knjige</label>
            </div>
            <input class="form-control" type="date" id="dtpRok" disabled style="margin-bottom:12px">
            <button class="btn btn-primary" style="width:100%" onclick="sacuvajIzmene()">Sačuvaj izmene</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal: Nova pozajmica -->
<div class="modal-overlay" id="newModal" style="display:none" onclick="if(event.target===this)closeNewModal()">
  <div class="modal" style="width:560px">
    <div class="modal-title">Nova pozajmica</div>

    <div class="form-group">
      <label class="form-label">Član</label>
      <select class="form-control" id="mClan">
        <option value="">Izaberite člana...</option>
      </select>
    </div>

    <div style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:8px">Knjige za pozajmicu</div>
    <div style="border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:14px">
      <div style="padding:8px 12px;background:var(--bg);display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)">
        <input type="text" id="mKnjigaSearch" class="search-input" placeholder="Pretraži dostupne knjige..." style="width:100%;flex:1" oninput="filterKnjige()">
      </div>
      <div id="knjigaLista" style="max-height:220px;overflow-y:auto;padding:8px"></div>
    </div>

    <div id="odabraneKnjige" style="margin-bottom:14px"></div>

    <div class="form-group">
      <label class="form-label">Rok vraćanja (za sve knjige)</label>
      <input class="form-control" type="date" id="mRok">
    </div>

    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeNewModal()">Odustani</button>
      <button class="btn btn-primary" onclick="kreirajPozajmicu()">Kreiraj pozajmicu</button>
    </div>
  </div>
</div>

<script src="api.js"></script>
<script src="sidebar.js"></script>
<script>
let pozajmice = [];
let selektovana = null;
let activeFilter = 'all';
let sveKnjige = [];
let sveClanovi = [];
let odabraneKnjige = [];

initPage('pozajmice');

async function ucitaj() {
  try {
    pozajmice = await API.getPozajmice();
    pozajmice.sort((a,b) => {
      const ord = {Zakasnelo:0, Aktivna:1, Vraceno:2};
      return (ord[a.status]??3) - (ord[b.status]??3) || new Date(b.datumOd)-new Date(a.datumOd);
    });
    renderTabela();
  } catch(ex) { toast('Greška: '+ex.message,'error'); }
}

function getFiltrirane() {
  const q = document.getElementById('txtSearch').value.trim().toLowerCase();
  return pozajmice.filter(p => {
    const matchF = activeFilter==='all' || p.status===activeFilter;
    const matchQ = !q
      || (p.imePrezimeClana||'').toLowerCase().includes(q)
      || (p.imePrezimeBibliotekar||'').toLowerCase().includes(q)
      || (p.stavke||[]).some(s=>(s.nazivKnjige||'').toLowerCase().includes(q));
    return matchF && matchQ;
  });
}

function renderTabela() {
  const lista = getFiltrirane();
  document.getElementById('lblBroj').textContent = `Ukupno: ${lista.length}`;
  const tb = document.getElementById('tbodyPoz');
  if (!lista.length) {
    tb.innerHTML='<tr><td colspan="6"><div class="empty-state"><div class="empty-state-icon">📋</div><div class="empty-state-text">Nema pozajmica</div></div></td></tr>';
    return;
  }
  tb.innerHTML = lista.map(p => {
    const naslovi = (p.stavke||[]).map(s=>s.nazivKnjige).filter(Boolean).join(', ');
    return `<tr onclick="selektuj(${p.id})" class="${selektovana?.id===p.id?'selected':''}">
      <td><strong>${p.imePrezimeClana||'—'}</strong></td>
      <td>${p.imePrezimeBibliotekar||'—'}</td>
      <td>${fmtDatum(p.datumOd)}</td>
      <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px;color:var(--muted)">${naslovi||'—'}</td>
      <td><span class="badge ${statusBadge(p.status)}">${p.status||'—'}</span></td>
      <td style="font-size:12px;color:var(--muted)">${p.datumVracanja?fmtDatum(p.datumVracanja):'—'}</td>
    </tr>`;
  }).join('');
}

function selektuj(id) {
  selektovana = pozajmice.find(p => p.id===id);
  if (!selektovana) return;
  renderTabela();
  prikaziDetalje(selektovana);
  document.getElementById('detailPanel').style.display='';
}

function prikaziDetalje(p) {
  const sb = document.getElementById('statusBar');
  const map = {Aktivna:['status-bar active','▶ Aktivna'],Zakasnelo:['status-bar expired','⚠ Zakasnela'],Vraceno:['status-bar active','✓ Vraćena']};
  const [cls, txt] = map[p.status]||['status-bar','—'];
  sb.className=cls; sb.textContent=txt;

  document.getElementById('dClan').textContent = p.imePrezimeClana||'—';
  document.getElementById('dBib').textContent = p.imePrezimeBibliotekar||'—';
  document.getElementById('dDatum').textContent = fmtDatum(p.datumOd);
  document.getElementById('dBrojK').textContent = (p.stavke||[]).length;

  // Stavke
  const cont = document.getElementById('stavkeContainer');
  cont.innerHTML = (p.stavke||[]).map(s => {
    const vracena = !!s.datumVracanja;
    const zakasnela = !vracena && new Date(s.rokPozajmice) < new Date();
    const cls = zakasnela?'stavka-row stavka-zakasnela':vracena?'stavka-row stavka-vracena':'stavka-row';
    const label = vracena?`✓ vraćena ${fmtDatum(s.datumVracanja)}`:zakasnela?`⚠ rok: ${fmtDatum(s.rokPozajmice)}`:`rok: ${fmtDatum(s.rokPozajmice)}`;
    return `<div class="${cls}" id="stavka_${s.id}">
      ${!vracena && (p.status==='Aktivna'||p.status==='Zakasnelo') ? `<input type="checkbox" class="stavka-chk" data-id="${s.idKnjige}">` : '<span style="width:16px"></span>'}
      <span class="stavka-title">${s.nazivKnjige||'—'}</span>
      <span class="stavka-rok" style="color:${zakasnela?'var(--danger)':vracena?'var(--success)':'var(--muted)'}">${label}</span>
    </div>`;
  }).join('');

  // Akcije panel
  const aktivna = p.status==='Aktivna'||p.status==='Zakasnelo';
  document.getElementById('akcijePanel').style.display = aktivna?'':'none';
  if (aktivna) {
    document.getElementById('chkIzmeniRok').checked = false;
    document.getElementById('dtpRok').disabled = true;
    const aktivneStavke = (p.stavke||[]).filter(s=>!s.datumVracanja);
    const maxRok = aktivneStavke.length ? aktivneStavke.reduce((m,s)=>new Date(s.rokPozajmice)>new Date(m.rokPozajmice)?s:m).rokPozajmice : null;
    if (maxRok) document.getElementById('dtpRok').value = maxRok.split('T')[0];
  }
}

async function sacuvajIzmene() {
  if (!selektovana) return;
  const chkovi = document.querySelectorAll('.stavka-chk:checked');
  const vratiIds = Array.from(chkovi).map(c=>parseInt(c.dataset.id));
  const izmeniRok = document.getElementById('chkIzmeniRok').checked;
  const noviRok = document.getElementById('dtpRok').value;

  if (vratiIds.length===0 && !izmeniRok) { toast('Označite knjige za vraćanje ili izmenu roka.','error'); return; }
  if (izmeniRok && (!noviRok || new Date(noviRok)<=new Date())) { toast('Rok mora biti u budućnosti.','error'); return; }

  let greska = false;
  try {
    for (const idKnjige of vratiIds) {
      await API.vratiKnjigu(selektovana.id, idKnjige).catch(()=>{ greska=true; });
    }
    if (izmeniRok) {
      await API.izmeniRok(selektovana.id, noviRok).catch(()=>{ greska=true; });
    }
    if (greska) toast('Jedna ili više izmena nije uspela.','error');
    else toast('Izmene su sačuvane.');
    await ucitaj();
    const updated = pozajmice.find(p=>p.id===selektovana.id);
    if (updated) { selektovana=updated; prikaziDetalje(updated); renderTabela(); }
  } catch(ex) { toast(ex.message,'error'); }
}

function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  renderTabela();
}
function pretrazi() { renderTabela(); }
function reset() { document.getElementById('txtSearch').value=''; activeFilter='all'; document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active')); document.querySelector('[data-filter="all"]').classList.add('active'); renderTabela(); }
document.getElementById('txtSearch').addEventListener('keydown',e=>{if(e.key==='Enter')pretrazi();});

// ── NOVA POZAJMICA ──────────────────────────────────────────────
async function openNewModal() {
  odabraneKnjige = [];
  document.getElementById('odabraneKnjige').innerHTML = '';
  document.getElementById('mKnjigaSearch').value = '';

  const rok = new Date(Date.now()+14*86400000).toISOString().split('T')[0];
  document.getElementById('mRok').value = rok;

  [sveKnjige, sveClanovi] = await Promise.all([
    API.getKnjige().catch(()=>[]),
    API.getClanovi().catch(()=>[])
  ]);

  const clanSel = document.getElementById('mClan');
  clanSel.innerHTML = '<option value="">Izaberite člana...</option>' +
    sveClanovi.map(c=>`<option value="${c.id}">${c.ime} ${c.prezime} (${c.telefon})</option>`).join('');

  filterKnjige();
  document.getElementById('newModal').style.display='flex';
}

function filterKnjige() {
  const q = document.getElementById('mKnjigaSearch').value.toLowerCase();
  const dostupne = sveKnjige.filter(k => k.dostupna && !odabraneKnjige.find(o=>o.id===k.id));
  const filtered = q ? dostupne.filter(k=>k.naziv.toLowerCase().includes(q)||k.imePisca.toLowerCase().includes(q)||k.prezimePisca.toLowerCase().includes(q)) : dostupne;
  const cont = document.getElementById('knjigaLista');
  if (!filtered.length) { cont.innerHTML='<div style="padding:12px;text-align:center;color:var(--muted);font-size:13px">Nema dostupnih knjiga</div>'; return; }
  cont.innerHTML = filtered.slice(0,20).map(k=>`
    <div onclick="odaberiKnjigu(${k.id})" style="padding:8px 10px;cursor:pointer;border-radius:7px;display:flex;justify-content:space-between;align-items:center;transition:background .1s" onmouseover="this.style.background='var(--bg)'" onmouseout="this.style.background=''">
      <div>
        <div style="font-size:13px;font-weight:500">${k.naziv}</div>
        <div style="font-size:11px;color:var(--muted)">${k.imePisca} ${k.prezimePisca}</div>
      </div>
      <span class="badge badge-success" style="flex-shrink:0">${k.brojSlobodnih} slobodnih</span>
    </div>`).join('');
}

function odaberiKnjigu(id) {
  const k = sveKnjige.find(x=>x.id===id);
  if (!k || odabraneKnjige.find(o=>o.id===id)) return;
  odabraneKnjige.push(k);
  filterKnjige();
  renderOdabrane();
}

function ukloniKnjigu(id) {
  odabraneKnjige = odabraneKnjige.filter(k=>k.id!==id);
  filterKnjige();
  renderOdabrane();
}

function renderOdabrane() {
  const cont = document.getElementById('odabraneKnjige');
  if (!odabraneKnjige.length) { cont.innerHTML=''; return; }
  cont.innerHTML = `
    <div style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:8px">Odabrane knjige (${odabraneKnjige.length})</div>
    ${odabraneKnjige.map(k=>`
      <div style="display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--bg);border-radius:7px;margin-bottom:5px">
        <span style="flex:1;font-size:13px">${k.naziv}</span>
        <button onclick="ukloniKnjigu(${k.id})" style="background:none;border:none;cursor:pointer;color:var(--danger);font-size:14px;padding:0" title="Ukloni">✕</button>
      </div>`).join('')}`;
}

function closeNewModal() { document.getElementById('newModal').style.display='none'; }

async function kreirajPozajmicu() {
  const idClan = parseInt(document.getElementById('mClan').value);
  const rok = document.getElementById('mRok').value;
  if (!idClan) { toast('Izaberite člana.','error'); return; }
  if (!odabraneKnjige.length) { toast('Dodajte bar jednu knjigu.','error'); return; }
  if (!rok) { toast('Unesite rok vraćanja.','error'); return; }

  const stavke = odabraneKnjige.map(k => ({ idKnjige: k.id, rokPozajmice: rok }));
  try {
    await API.addPozajmica({ idClan, stavke });
    toast('Pozajmica je uspešno kreirana.');
    closeNewModal();
    await ucitaj();
  } catch(ex) { toast(ex.message,'error'); }
}

function statusBadge(s) {
  if (s==='Aktivna') return 'badge-info';
  if (s==='Zakasnelo') return 'badge-danger';
  if (s==='Vraceno') return 'badge-success';
  return 'badge-muted';
}

ucitaj();
</script>
</body>
</html>
