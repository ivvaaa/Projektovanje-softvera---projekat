<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteka — Knjige</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <style>
        .pagination {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 16px 22px;
            border-top: 1px solid var(--border-lt)
        }

        .pagination-info {
            font-family: Syne,sans-serif;
            font-size: 10px;
            color: var(--muted);
            flex: 1;
            font-weight: 700;
            letter-spacing: .08em;
            text-transform: uppercase
        }
    </style>
</head>
<body>
    <div class="app-shell">
        <div class="main-content">
            <div class="page-header">
                <div>
                    <div class="page-title">Knjige</div>
                    <div class="page-subtitle">Katalog knjiga biblioteke</div>
                </div>
                <button class="btn btn-primary" onclick="openAddModal()">+ Dodaj knjigu</button>
            </div>

            <div class="card" style="margin-bottom:20px">
                <div class="card-body" style="padding:14px 22px">
                    <div class="search-bar">
                        <input class="search-input" id="txtSearch" type="text" placeholder="Pretraži po naslovu ili piscu...">
                        <button class="btn btn-secondary" onclick="pretrazi()">Pretraži</button>
                        <button class="btn btn-secondary" onclick="reset()">Reset</button>
                        <span style="margin-left:auto;font-family:Syne,sans-serif;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)" id="lblBroj"></span>
                    </div>
                </div>
            </div>

            <div class="split-layout">
                <div class="card">
                    <div class="table-wrap">
                        <table>
                            <thead><tr><th>Naslov</th><th>Pisac</th><th>Primeraka</th><th>Slobodnih</th><th>Status</th></tr></thead>
                            <tbody id="tbodyKnjige">
                                <tr><td colspan="5"><div class="loading-state"><div class="spinner"></div>Učitavanje...</div></td></tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="pagination" id="paginacija" style="display:none">
                        <span class="pagination-info" id="paginacijaInfo"></span>
                        <button class="btn btn-secondary btn-sm" id="btnPrev" onclick="promeniStranu(-1)">← Preth. 10</button>
                        <button class="btn btn-secondary btn-sm" id="btnNext" onclick="promeniStranu(1)">Sled. 10 →</button>
                    </div>
                </div>

                <div id="detailPanel" style="display:none">
                    <div class="detail-panel">
                        <div id="statusBar" class="status-bar"></div>
                        <div class="detail-row"><span class="detail-label">Naslov</span><span class="detail-value" id="dNaziv"></span></div>
                        <div class="detail-row"><span class="detail-label">Pisac</span><span class="detail-value" id="dPisac"></span></div>
                        <div class="detail-row"><span class="detail-label">Primeraka</span><span class="detail-value" id="dUkupno"></span></div>
                        <div class="detail-row"><span class="detail-label">Slobodnih</span><span class="detail-value" id="dSlobodnih"></span></div>
                        <hr style="margin:16px 0;border:none;border-top:1px solid var(--border-lt)">
                        <div style="font-family:Syne,sans-serif;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:14px">Izmena podataka</div>
                        <div class="form-group"><label class="form-label">Naslov</label><input class="form-control" id="eNaziv" type="text"></div>
                        <div class="form-row">
                            <div class="form-group"><label class="form-label">Ime pisca</label><input class="form-control" id="eIme" type="text"></div>
                            <div class="form-group"><label class="form-label">Prezime pisca</label><input class="form-control" id="ePrezime" type="text"></div>
                        </div>
                        <div class="form-group"><label class="form-label">Broj primeraka</label><input class="form-control" id="eBroj" type="number" min="1"></div>
                        <div style="display:flex;gap:8px;margin-top:6px">
                            <button class="btn btn-primary" style="flex:1" onclick="sacuvajIzmene()">Sačuvaj</button>
                            <button class="btn btn-danger btn-sm" onclick="obrisiKnjigu()">Obriši</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="addModal" style="display:none" onclick="if(event.target===this)closeAddModal()">
        <div class="modal">
            <div class="modal-title">Dodaj novu knjigu</div>
            <div class="form-group"><label class="form-label">Naslov knjige</label><input class="form-control" id="mNaziv" type="text" placeholder="Unesite naslov"></div>
            <div class="form-row">
                <div class="form-group"><label class="form-label">Ime pisca</label><input class="form-control" id="mIme" type="text"></div>
                <div class="form-group"><label class="form-label">Prezime pisca</label><input class="form-control" id="mPrezime" type="text"></div>
            </div>
            <div class="form-group"><label class="form-label">Broj primeraka</label><input class="form-control" id="mBroj" type="number" min="1" value="1"></div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeAddModal()">Odustani</button>
                <button class="btn btn-primary" onclick="dodajKnjigu()">Sačuvaj</button>
            </div>
        </div>
    </div>

    <script src="/api.js"></script>
    <script src="/sidebar.js"></script>
    <script>
        let knjige = [], selektovanaKnjiga = null;
        const PAGE_SIZE = 10;
        let trenutnaStrana = 0;

        (async () => {
            const status = await requireAuth();
            if (!status) return;
            initPage('knjige', status);
            await ucitaj();
        })();

        async function ucitaj(q = '') {
            try {
                knjige = await API.getKnjige(q);
                trenutnaStrana = 0;
                document.getElementById('lblBroj').textContent = `Ukupno: ${knjige.length}`;
                renderTabela();
            } catch (ex) { toast('Greška: ' + ex.message, 'error'); }
        }

        function renderTabela() {
            const tb = document.getElementById('tbodyKnjige');
            if (!knjige.length) {
                tb.innerHTML = '<tr><td colspan="5"><div class="empty-state"><div class="empty-state-icon">◫</div><div class="empty-state-text">Nema rezultata</div></div></td></tr>';
                document.getElementById('paginacija').style.display = 'none'; return;
            }
            const od = trenutnaStrana * PAGE_SIZE, do_ = Math.min(od + PAGE_SIZE, knjige.length);
            tb.innerHTML = knjige.slice(od, do_).map(k => `
        <tr onclick="selektuj(${k.id})" class="${selektovanaKnjiga?.id === k.id ? 'selected' : ''}">
          <td style="font-weight:600">${k.naziv}</td>
          <td style="color:var(--muted)">${k.imePisca} ${k.prezimePisca}</td>
          <td style="font-family:Syne,sans-serif;font-weight:700">${k.brojPrimeraka}</td>
          <td style="font-family:Syne,sans-serif;font-weight:800;color:${k.brojSlobodnih === 0 ? 'var(--danger)' : 'var(--success)'}">${k.brojSlobodnih}</td>
          <td><span class="badge ${k.dostupna ? 'badge-success' : 'badge-danger'}">${k.dostupna ? 'Dostupna' : 'Nedostupna'}</span></td>
        </tr>`).join('');
            const pag = document.getElementById('paginacija');
            pag.style.display = knjige.length > PAGE_SIZE ? '' : 'none';
            document.getElementById('paginacijaInfo').textContent = `${od + 1}–${do_} od ${knjige.length}`;
            document.getElementById('btnPrev').disabled = trenutnaStrana === 0;
            document.getElementById('btnNext').disabled = do_ >= knjige.length;
        }

        function promeniStranu(s) { trenutnaStrana += s; selektovanaKnjiga = null; document.getElementById('detailPanel').style.display = 'none'; renderTabela(); }

        function selektuj(id) {
            selektovanaKnjiga = knjige.find(k => k.id === id);
            if (!selektovanaKnjiga) return;
            renderTabela(); prikaziDetalje(selektovanaKnjiga);
            document.getElementById('detailPanel').style.display = '';
        }

        function prikaziDetalje(k) {
            const sb = document.getElementById('statusBar');
            sb.className = k.dostupna ? 'status-bar active' : 'status-bar expired';
            sb.textContent = k.dostupna ? '✓ Dostupna' : '✗ Nedostupna — svi primerci pozajmljeni';
            document.getElementById('dNaziv').textContent = k.naziv;
            document.getElementById('dPisac').textContent = `${k.imePisca} ${k.prezimePisca}`;
            document.getElementById('dUkupno').textContent = k.brojPrimeraka;
            document.getElementById('dSlobodnih').textContent = k.brojSlobodnih;
            document.getElementById('eNaziv').value = k.naziv;
            document.getElementById('eIme').value = k.imePisca;
            document.getElementById('ePrezime').value = k.prezimePisca;
            document.getElementById('eBroj').value = k.brojPrimeraka;
            document.getElementById('eBroj').min = Math.max(1, k.brojPrimeraka - k.brojSlobodnih);
        }

        async function sacuvajIzmene() {
            if (!selektovanaKnjiga) return;
            const naziv = document.getElementById('eNaziv').value.trim();
            const ime = document.getElementById('eIme').value.trim();
            const prezime = document.getElementById('ePrezime').value.trim();
            const broj = parseInt(document.getElementById('eBroj').value);
            if (!naziv || !ime || !prezime || isNaN(broj) || broj < 1) { toast('Popunite sva polja.', 'error'); return; }
            try {
                await API.updateKnjiga(selektovanaKnjiga.id, { naziv, imePisca: ime, prezimePisca: prezime, brojPrimeraka: broj });
                toast('Knjiga izmenjena.');
                await ucitaj(document.getElementById('txtSearch').value.trim());
                const u = knjige.find(k => k.id === selektovanaKnjiga.id);
                if (u) { selektovanaKnjiga = u; prikaziDetalje(u); }
            } catch (ex) { toast(ex.message, 'error'); }
        }

        async function obrisiKnjigu() {
            if (!selektovanaKnjiga) return;
            if (!confirm(`Obrisati "${selektovanaKnjiga.naziv}"?`)) return;
            try {
                await API.deleteKnjiga(selektovanaKnjiga.id);
                toast('Knjiga obrisana.'); selektovanaKnjiga = null;
                document.getElementById('detailPanel').style.display = 'none';
                await ucitaj();
            } catch (ex) { toast(ex.message, 'error'); }
        }

        function pretrazi() { ucitaj(document.getElementById('txtSearch').value.trim()); }
        function reset() { document.getElementById('txtSearch').value = ''; ucitaj(); }
        document.getElementById('txtSearch').addEventListener('keydown', e => { if (e.key === 'Enter') pretrazi(); });

        function openAddModal() {
            ['mNaziv', 'mIme', 'mPrezime'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('mBroj').value = '1';
            document.getElementById('addModal').style.display = 'flex';
            setTimeout(() => document.getElementById('mNaziv').focus(), 50);
        }
        function closeAddModal() { document.getElementById('addModal').style.display = 'none'; }

        async function dodajKnjigu() {
            const naziv = document.getElementById('mNaziv').value.trim();
            const ime = document.getElementById('mIme').value.trim();
            const prezime = document.getElementById('mPrezime').value.trim();
            const broj = parseInt(document.getElementById('mBroj').value);
            if (!naziv || !ime || !prezime || isNaN(broj) || broj < 1) { toast('Popunite sva polja.', 'error'); return; }
            try {
                await API.addKnjiga({ naziv, imePisca: ime, prezimePisca: prezime, brojPrimeraka: broj });
                toast('Knjiga dodata.'); closeAddModal(); await ucitaj();
            } catch (ex) { toast(ex.message, 'error'); }
        }
    </script>
</body>
</html>
